      (function () {
        var width = window.innerWidth || document.documentElement.clientWidth || 0;
        var height = window.innerHeight || document.documentElement.clientHeight || 0;
        var narrowSide = Math.min(width, height);
        var longSide = Math.max(width, height);
        var coarse = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
        var mobile = (narrowSide <= 540 && longSide <= 1000) || (coarse && narrowSide <= 1024 && longSide <= 1400);
        var root = document.documentElement;
        root.dataset.screenDevice = mobile ? "mobile" : "desktop";
        root.dataset.screenOrientation = height > width ? "portrait" : "landscape";
        root.classList.toggle("screen-mobile-preflight", mobile);
      })();
    </script>
